services:
  postgres:
    image: postgres:15-alpine
    container_name: genshin-banpick-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-genshin_banpick}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # host:5434 → container:5432
    # 5432 給 host PG14，5433 預留給 EC2 SSH tunnel
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-genshin_banpick}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    # image 名跟 docker compose 自動命名一致 (project-service)，方便 deploy-to-ec2.sh
    # 在 EC2 上載入後直接被找到
    image: genshin-ban-pick-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genshin-banpick-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-genshin_banpick}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres-data:
